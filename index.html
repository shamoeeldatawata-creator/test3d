<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour: Mehran Mountain Undulation</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { width: 100vw; height: 100vh; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #score-board { font-size: 2.5rem; font-weight: 900; margin-bottom: 2px; }
        #speed-o-meter { font-size: 1.5rem; opacity: 1.0; letter-spacing: 2px; font-weight: bold; color: #fff; }
        #gear-indicator { font-size: 1.1rem; color: #fffa00; margin-top: 5px; font-weight: bold; }
        #warning-label { font-size: 0.9rem; color: #ff4444; margin-top: 10px; display: none; font-weight: bold; text-transform: uppercase; }

        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 50px 80px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 20;
        }

        h1 { text-transform: uppercase; margin: 0; font-size: 2.5rem; letter-spacing: 2px; color: #ff7e5f; }

        button {
            background: #ffffff;
            color: #d35400;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            border-radius: 50px;
            pointer-events: all;
        }
        button:hover { background: #fffa00; color: #000; transform: scale(1.05); }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            pointer-events: none;
            text-align: center;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none;
            justify-content: space-around;
            padding: 20px;
            pointer-events: auto;
            z-index: 15;
        }

        .mobile-controls.active {
            display: flex;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: 2px solid white;
            background: rgba(255, 127, 95, 0.7);
            cursor: pointer;
            touch-action: none;
            user-select: none;
            transition: all 0.1s;
        }

        .mobile-btn:active {
            background: rgba(255, 127, 95, 1);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-board">0000</div>
        <div id="speed-o-meter">0 KM/H</div>
        <div id="gear-indicator">GEAR: N</div>
        <div id="warning-label">UNSTABLE - REDUCE SPEED</div>
    </div>
    <div id="container"></div>
    
    <div id="start-screen" class="game-overlay">
        <h1>Mehran simulator</h1>
        <p style="letter-spacing: 1px; margin-top: 10px; opacity: 0.8;">Mountain Undulation Spec</p>
        <p style="font-size: 0.8rem; margin-top: 5px;">Road Elevations | Cleared Valleys | 0-100: 24s</p>
        <button id="start-btn">Ignition</button>
    </div>

    <div id="game-over" class="game-overlay" style="display: none;">
        <h1 style="color: #ff4444;">Accident</h1>
        <p id="final-score" style="font-size: 1.5rem; margin: 10px 0;">DISTANCE: 0</p>
        <button id="retry-btn">Try Again</button>
    </div>

    <div class="controls-hint" id="controls-hint">W/S: Throttle/Brake | A/D: Steering<br>Experience torque drop on uphill climbs</div>

    <div class="mobile-controls" id="mobile-controls">
        <button class="mobile-btn" id="throttle-btn">▲<br>GAS</button>
        <button class="mobile-btn" id="brake-btn">▼<br>BRAKE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Global variables
        let scene, camera, renderer, car, treeAnchor, trafficCarModel;
        let gameRunning = false;
        let speed = 0;
        let score = 0;
        let currentGear = "N";
        let roadOffsetZ = 0; // Tracks player progression for height calculation
        
        let throttleInput = 0;
        let brakeInput = 0;

        // Mobile and Gyroscope Support
        let isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let gyroEnabled = false;
        let gyroX = 0; // Gyro tilt (steering value)
        let touchThrottle = false;
        let touchBrake = false;

        // REAL MEHRAN PHYSICS SPECS
        const maxSpeedUnits = 0.4; 
        const brakingStrength = 0.005;
        const frictionBase = 0.0002;   
        const steeringInertia = 0.06;  
        const steerPenalty = 0.0006;   

        const gears = [
            { label: "1", minSpeed: 0, maxSpeed: 0.07, accel: 0.0004 }, 
            { label: "2", minSpeed: 0.07, maxSpeed: 0.15, accel: 0.00025 },
            { label: "3", minSpeed: 0.15, maxSpeed: 0.28, accel: 0.00015 }, 
            { label: "4", minSpeed: 0.28, maxSpeed: 0.4, accel: 0.00004 } 
        ];

        const segmentLength = 100;
        const visibleSegments = 7;
        const singleRoadWidth = 8; 
        const medianWidth = 3; 
        const laneX = [2.2, 5.8]; 
        const oncomingLaneX = [-2.2, -5.8]; 

        let roadSegments = [];
        let obstacles = [];
        let oncomingCars = [];

        const CAR_MODEL_URL = 'https://raw.githubusercontent.com/shamoeeldatawata-creator/test3d/main/car.glb';
        const TREE_MODEL_URL = 'https://raw.githubusercontent.com/shamoeeldatawata-creator/test3d/main/tree.glb';

        let keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // Undulating Road logic: Sine waves of varying frequency
        function getRoadHeight(z) {
            // Completely flat road
            return 0;
        }

        // Calculate slope to affect car performance and rotation
        function getRoadSlope(z) {
            const h1 = getRoadHeight(z);
            const h2 = getRoadHeight(z - 1);
            return h1 - h2;
        }

        window.startGame = function() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
        };

        window.restartGame = function() {
            score = 0; speed = 0; currentGear = "N"; roadOffsetZ = 0;
            throttleInput = 0; brakeInput = 0;
            if(car) car.position.set(laneX[0], 0.1, 0);
            [...obstacles, ...oncomingCars].forEach(o => scene.remove(o));
            obstacles = [];
            oncomingCars = [];
            document.getElementById('game-over').style.display = 'none';
            gameRunning = true;
        };

        document.getElementById('start-btn').addEventListener('click', window.startGame);
        document.getElementById('retry-btn').addEventListener('click', window.restartGame);

        function init() {
            scene = new THREE.Scene();
            
            const canvas = document.createElement('canvas');
            canvas.width = 2; canvas.height = 512;
            const context = canvas.getContext('2d');
            const grad = context.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#0a0d14'); 
            grad.addColorStop(0.6, '#b21f1f'); 
            grad.addColorStop(1, '#fdbb2d'); 
            context.fillStyle = grad;
            context.fillRect(0, 0, 2, 512);
            scene.background = new THREE.CanvasTexture(canvas);
            
            scene.fog = new THREE.Fog(0xff3300, 10, 600);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 1.8, 4.5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            
            const createSunGlow = () => {
                const group = new THREE.Group();
                const glow = new THREE.Mesh(new THREE.CircleGeometry(400, 32), new THREE.MeshBasicMaterial({ 
                    color: 0xff4500, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false
                }));
                glow.position.z = -0.1;
                group.add(glow);
                group.position.set(0, 2, -950);
                scene.add(group);
            };
            createSunGlow();

            // Setup Mobile Controls
            if (isMobileDevice) {
                document.getElementById('mobile-controls').classList.add('active');
                document.getElementById('controls-hint').innerHTML = 'Tilt to steer • Use buttons for throttle/brake';
                initializeGyroscope();
            }

            const loader = new THREE.GLTFLoader();
            loader.load(TREE_MODEL_URL, (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const scale = 22 / box.getSize(new THREE.Vector3()).y;
                model.scale.set(scale, scale, scale);
                treeAnchor = new THREE.Group();
                model.position.y = -box.min.y * scale; 
                treeAnchor.add(model);
                for(let i = 0; i < visibleSegments; i++) {
                    createRoadSegment(-i * segmentLength);
                }
            });

            loader.load(CAR_MODEL_URL, (gltf) => {
                trafficCarModel = gltf.scene;
                car = trafficCarModel.clone();
                const box = new THREE.Box3().setFromObject(car);
                const scale = 2 / box.getSize(new THREE.Vector3()).z; 
                car.scale.set(scale, scale, scale);
                
                car.traverse(n => { 
                    if(n.isMesh) { 
                        n.material = n.material.clone();
                        n.material.metalness = 0.4; 
                        n.material.roughness = 0.3; 
                        n.material.emissive = n.material.color;
                        n.material.emissiveIntensity = 0.15;
                    } 
                });
                scene.add(car);
                car.position.set(laneX[0], 0.1, 0);
                car.rotation.y = 0;
            });

            window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
            window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        // Gyroscope initialization
        function initializeGyroscope() {
            // Request permission for iOS 13+
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleGyroMotion);
                            gyroEnabled = true;
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS 13+ devices
                window.addEventListener('deviceorientation', handleGyroMotion);
                gyroEnabled = true;
            }

            // Setup touch buttons for mobile
            const throttleBtn = document.getElementById('throttle-btn');
            const brakeBtn = document.getElementById('brake-btn');

            throttleBtn.addEventListener('touchstart', (e) => { touchThrottle = true; e.preventDefault(); });
            throttleBtn.addEventListener('touchend', (e) => { touchThrottle = false; e.preventDefault(); });
            throttleBtn.addEventListener('mousedown', () => { touchThrottle = true; });
            throttleBtn.addEventListener('mouseup', () => { touchThrottle = false; });

            brakeBtn.addEventListener('touchstart', (e) => { touchBrake = true; e.preventDefault(); });
            brakeBtn.addEventListener('touchend', (e) => { touchBrake = false; e.preventDefault(); });
            brakeBtn.addEventListener('mousedown', () => { touchBrake = true; });
            brakeBtn.addEventListener('mouseup', () => { touchBrake = false; });
        }

        function handleGyroMotion(event) {
            const gamma = event.gamma; // Tilt left-right (-90 to 90)
            const beta = event.beta;   // Tilt forward-backward (-180 to 180)
            
            // Map gamma (left-right tilt) to steering: -60 to 60 degrees maps to -1 to 1
            gyroX = gamma / 60;
            gyroX = Math.max(-1, Math.min(1, gyroX)); // Clamp between -1 and 1
        }

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        window.addEventListener('resize', onWindowResize);

        // Terrain logic: Flat around the road, Rugged elsewhere
        function generateMountainHeight(x, z) {
            const roadPlateauWidth = singleRoadWidth + medianWidth + 8; 
            const absX = Math.abs(x);
            
            // Base road height (all terrain follows the road undulation)
            const baseHeight = getRoadHeight(z);

            if (absX < roadPlateauWidth) {
                // Return just the road height for a flat surface near the highway
                return baseHeight - 0.15;
            }
            
            // Mountains rise from the road level - only far from road
            let mountainNoise = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 35;
            mountainNoise += Math.sin(x * 0.02) * 70; 
            mountainNoise += Math.cos(z * 0.015) * 50; 
            
            // Mask the mountain noise - start further from road
            const fadeStart = roadPlateauWidth + 3;
            const fadeEnd = roadPlateauWidth + 30;
            const mask = Math.min(1, Math.max(0, (absX - fadeStart) / (fadeEnd - fadeStart)));
            
            return baseHeight + (mountainNoise * mask);
        }

        function createRoadSegment(z) {
            const group = new THREE.Group();
            
            // Road uses segmented planes to follow height
            const roadGeo = new THREE.PlaneGeometry(singleRoadWidth, segmentLength, 1, 20);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.0 });
            
            const roadRight = new THREE.Mesh(roadGeo, roadMat);
            const roadLeft = new THREE.Mesh(roadGeo, roadMat);

            [roadRight, roadLeft].forEach((r, idx) => {
                const pos = r.geometry.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    const worldZ = z + pos.getY(i);
                    pos.setZ(i, getRoadHeight(worldZ));
                }
                r.geometry.computeVertexNormals();
                r.rotation.x = -Math.PI / 2;
                r.position.x = (idx === 0 ? 1 : -1) * (medianWidth/2 + singleRoadWidth/2);
                r.position.y = 0.2;
                group.add(r);
            });

            // Center Dash Lines (Small separate meshes following height)
            for(let i = 0; i < 4; i++) {
                const lineZ = -segmentLength/2 + (i * 25) + 12.5;
                const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(medianWidth/2 + singleRoadWidth/2, getRoadHeight(z + lineZ) + 0.23, lineZ);
                group.add(dash);
                const dashL = dash.clone();
                dashL.position.x = -(medianWidth/2 + singleRoadWidth/2);
                group.add(dashL);
            }

            // Mountainous Ground
            const groundGeo = new THREE.PlaneGeometry(1500, segmentLength, 80, 16);
            const posAttr = groundGeo.attributes.position;
            for(let i = 0; i < posAttr.count; i++) {
                const x = posAttr.getX(i);
                const worldZ = z + posAttr.getY(i); 
                const h = generateMountainHeight(x, worldZ);
                posAttr.setZ(i, h);
            }
            groundGeo.computeVertexNormals();

            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a1208, 
                roughness: 1.0, 
                flatShading: true
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.15;
            group.add(ground);

            if (treeAnchor) {
                for (let i = 0; i < 55; i++) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const tx = (singleRoadWidth + 12 + Math.random() * 400) * side;
                    const tz = (Math.random() - 0.5) * segmentLength;
                    const ty = generateMountainHeight(tx, z + tz);
                    
                    const tree = treeAnchor.clone();
                    tree.position.set(tx, ty, tz);
                    tree.rotation.y = Math.random() * Math.PI * 2;
                    tree.scale.multiplyScalar(0.7 + Math.random() * 1.4);
                    group.add(tree);
                }
            }
            group.position.z = z;
            scene.add(group);
            roadSegments.push(group);
        }

        function spawnTraffic(isOncoming) {
            if (!trafficCarModel) return;
            const lanes = isOncoming ? oncomingLaneX : laneX;
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            const trafficCar = trafficCarModel.clone();
            const box = new THREE.Box3().setFromObject(trafficCar);
            const scale = 2 / box.getSize(new THREE.Vector3()).z;
            trafficCar.scale.set(scale, scale, scale);
            
            trafficCar.traverse(n => { if(n.isMesh) { n.material = n.material.clone(); n.material.emissiveIntensity = 0.2; } });
            
            const startZ = -700 - Math.random() * 500;
            trafficCar.position.set(lane, getRoadHeight(startZ), startZ);
            trafficCar.rotation.y = isOncoming ? 0 : Math.PI;
            
            scene.add(trafficCar);
            if(isOncoming) oncomingCars.push(trafficCar);
            else obstacles.push(trafficCar);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = `DISTANCE: ${Math.floor(score)} M`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameRunning && car) {
                let activeGear = gears[0];
                for(let g of gears) { if (speed >= g.minSpeed) activeGear = g; }
                currentGear = activeGear.label;

                // Physics logic
                if (isMobileDevice) {
                    // Mobile: Use touch buttons for throttle/brake
                    throttleInput = touchThrottle ? THREE.MathUtils.lerp(throttleInput, 1.0, 0.03) : THREE.MathUtils.lerp(throttleInput, 0, 0.05);
                    brakeInput = touchBrake ? THREE.MathUtils.lerp(brakeInput, 1.0, 0.1) : THREE.MathUtils.lerp(brakeInput, 0, 0.2);
                } else {
                    // Desktop: Use keyboard
                    if (keys.w || keys.ArrowUp) throttleInput = THREE.MathUtils.lerp(throttleInput, 1.0, 0.03);
                    else throttleInput = THREE.MathUtils.lerp(throttleInput, 0, 0.05);
                    
                    if (keys.s || keys.ArrowDown) brakeInput = THREE.MathUtils.lerp(brakeInput, 1.0, 0.1);
                    else brakeInput = THREE.MathUtils.lerp(brakeInput, 0, 0.2);
                }

                // Road Slope Physics
                const slope = getRoadSlope(0); // Check slope at car's z position
                const gravityPull = slope * 0.005; // Pull back on uphill, push on downhill
                
                if (throttleInput > 0.01) speed += (activeGear.accel * throttleInput) - gravityPull;
                if (brakeInput > 0.01) speed = Math.max(0, speed - (brakingStrength * brakeInput));

                if (speed > 0) speed = Math.max(0, speed - frictionBase);
                speed = Math.min(maxSpeedUnits, speed);

                const displayKmh = Math.floor(speed * 350);
                score += speed * 2;
                roadOffsetZ -= speed * 100; // Drive forward

                document.getElementById('score-board').innerText = Math.floor(score).toString().padStart(4, '0');
                document.getElementById('speed-o-meter').innerText = `${displayKmh} KM/H`;
                document.getElementById('gear-indicator').innerText = `GEAR: ${speed > 0.002 ? currentGear : 'N'}`;

                // Instability
                let vibrationAmount = 0;
                if (displayKmh > 100) {
                    document.getElementById('warning-label').style.display = 'block';
                    vibrationAmount = (displayKmh - 100) * 0.0014;
                } else {
                    document.getElementById('warning-label').style.display = 'none';
                }

                // Steering
                const steeringTarget = isMobileDevice 
                    ? gyroX  // Mobile: Use gyroscope tilt
                    : (keys.a || keys.ArrowLeft) ? 1 : (keys.d || keys.ArrowRight) ? -1 : 0;  // Desktop: Use keyboard
                const drift = vibrationAmount > 0 ? (Math.random() - 0.5) * vibrationAmount * 2.5 : 0;
                const steeringFactor = (steeringTarget + drift) * (0.08 * (speed / maxSpeedUnits + 0.4));
                car.position.x = THREE.MathUtils.lerp(car.position.x, car.position.x + (steeringFactor * 10), steeringInertia);
                car.position.x = THREE.MathUtils.clamp(car.position.x, medianWidth/2 + 0.4, medianWidth/2 + singleRoadWidth - 0.4);
                
                // Update Car Position Y and Rotation Pitch
                car.position.y = getRoadHeight(0) + 0.05;
                const pitch = Math.atan2(getRoadSlope(0), 1) * -10;
                car.rotation.x = THREE.MathUtils.lerp(car.rotation.x, pitch, 0.1);

                // Road Movement and Recycling
                for(let i = roadSegments.length - 1; i >= 0; i--) {
                    const seg = roadSegments[i];
                    seg.position.z -= speed * 100;
                    if(seg.position.z < -segmentLength * 2) {
                        // Remove old segment and create new one at the front
                        scene.remove(seg);
                        roadSegments.splice(i, 1);
                        // Create new segment at the front
                        const newSegZ = Math.max(...roadSegments.map(s => s.position.z)) + segmentLength;
                        createRoadSegment(newSegZ);
                    }
                }

                // NPC Traffic Logic
                if(obstacles.length < 4) spawnTraffic(false);
                if(oncomingCars.length < 6) spawnTraffic(true);

                for(let i = obstacles.length - 1; i >= 0; i--) {
                    const o = obstacles[i];
                    o.position.z += (speed - 0.015) * 100;
                    o.position.y = getRoadHeight(o.position.z) + 0.05;
                    o.rotation.x = Math.atan2(getRoadSlope(o.position.z), 1) * -10;
                    if(Math.abs(car.position.z - o.position.z) < 2.5 && Math.abs(car.position.x - o.position.x) < 1.6) gameOver();
                    if(o.position.z > 50) { scene.remove(o); obstacles.splice(i, 1); }
                }

                for(let i = oncomingCars.length - 1; i >= 0; i--) {
                    const o = oncomingCars[i];
                    o.position.z += (speed + 0.012) * 100; 
                    o.position.y = getRoadHeight(o.position.z) + 0.05;
                    o.rotation.x = Math.atan2(getRoadSlope(o.position.z), 1) * -10;
                    if(Math.abs(car.position.z - o.position.z) < 2.5 && Math.abs(car.position.x - o.position.x) < 1.6) gameOver();
                    if(o.position.z > 50) { scene.remove(o); oncomingCars.splice(i, 1); }
                }

                const steerTilt = isMobileDevice 
                    ? (gyroX * 0.05)  // Mobile: Use gyroscope for tilt
                    : (keys.a || keys.ArrowLeft) ? 0.05 : (keys.d || keys.ArrowRight) ? -0.05 : 0;  // Desktop: Use keyboard
                car.rotation.y = THREE.MathUtils.lerp(car.rotation.y, 0 + steerTilt + drift, 0.08);
                car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, steerTilt * 0.4, 0.05);

                // CAMERA
                const camX = car.position.x;
                const camY = car.position.y + 1.6 + (speed * 0.3) + (Math.random() * vibrationAmount);
                const camZ = -4.0 + (Math.random() * vibrationAmount);
                
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, camX, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, camY, 0.05);
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, camZ, 0.1);
                
                camera.lookAt(car.position.x, car.position.y + 0.5, 15);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
